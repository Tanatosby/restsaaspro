<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Menú Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Identidad "Pro Console" — slate + índigo-violeta */
    :root {
      --bg:          #0a0a14;
      --bg-2:        #0e0e1a;
      --surface:     #13131f;
      --surface-2:   #1a1a2a;
      --border:      #252538;
      --border-hi:   #353550;
      --accent:      #8b5cf6;
      --accent-2:    #a78bfa;
      --accent-dim:  rgba(139,92,246,0.25);
      --accent-glow: rgba(139,92,246,0.30);
      --text:        #f5f5ff;
      --text-2:      #b8b8d0;
      --muted:       #6a6a90;
      --danger:      #f87171;
      --danger-bg:   #2a1620;

      --font:        'Inter', system-ui, sans-serif;
      --font-mono:   'JetBrains Mono', ui-monospace, monospace;
      --font-display:'Syne', sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 13.5px;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient glow + noise sutil */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(circle at 18% 12%, var(--accent-glow) 0%, transparent 35%),
        radial-gradient(circle at 86% 90%, rgba(96,165,250,0.10) 0%, transparent 45%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    /* Grid sutil con accent del nuevo color */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(139,92,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      border: 1px solid var(--accent);
      background: rgba(139,92,246,0.08);
      color: var(--accent-2);
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeDown 0.4s ease both;
      box-shadow: 0 4px 18px var(--accent-glow);
    }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 0 3px var(--accent-dim);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 400px;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      border: 1px solid var(--border-hi);
      border-radius: 14px; overflow: hidden;
      animation: fadeUp 0.55s cubic-bezier(.16,1,.3,1) both 0.1s;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.55),
        0 0 0 1px var(--accent-dim);
      position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 30%, transparent 70%, rgba(96,165,250,0.15) 100%);
      opacity: 0.6;
    }

    .card-header {
      padding: 1.6rem 1.85rem 1.3rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: -0.025em; color: var(--text); line-height: 1.1;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .card-title::before {
      content: ''; width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .card-title span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .card-sub {
      margin-top: 8px;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); letter-spacing: 0.05em;
    }

    .card-body {
      padding: 1.6rem 1.85rem;
      display: flex; flex-direction: column; gap: 1.1rem;
      position: relative;
    }

    /* ── Fields ── */
    .field label {
      display: block; font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .field input {
      width: 100%; background: var(--bg-2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; font-family: var(--font);
      font-size: 14px; color: var(--text);
      outline: none; transition: all 0.18s; min-height: 44px;
    }

    .field input::placeholder { color: var(--muted); opacity: 0.45; }

    .field input:focus {
      border-color: var(--accent); background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* password wrapper */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px;
      transition: color 0.2s, transform 0.15s; line-height: 1;
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .pw-toggle:hover  { color: var(--accent); }
    .pw-toggle:active { transform: translateY(-50%) scale(0.92); }

    /* ── Error ── */
    #error-msg {
      display: none; align-items: flex-start; gap: 8px;
      background: var(--danger-bg);
      border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      border-radius: 8px; padding: 10px 14px;
      color: var(--danger); font-size: 12.5px; line-height: 1.5;
    }
    #error-msg.visible { display: flex; animation: fadeUp .2s ease; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff; border: none; border-radius: 10px;
      padding: 13px; font-family: var(--font);
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; margin-top: 6px;
      min-height: 46px;
      box-shadow: 0 8px 22px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.12) inset;
    }
    .btn-submit:hover   { box-shadow: 0 12px 30px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.16) inset; transform: translateY(-1px); }
    .btn-submit:active  { transform: translateY(0) scale(0.99); }
    .btn-submit:disabled {
      opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 1rem 1.85rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: relative;
    }

    .footer-tag {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.08em;
    }

    .footer-link {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-2); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    .footer-link:hover { color: var(--accent); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="badge">
      <span class="badge-dot"></span>
      Superadmin access
    </div>

    <div class="card">

      <div class="card-header">
        <div class="card-title">Menú <span>Pro</span></div>
        <div class="card-sub">// pro console — restricted area</div>
      </div>

      <div class="card-body">

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email"
            placeholder="admin@yourdomain.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" type="password" autocomplete="current-password"
              placeholder="••••••••••••" required />
            <button type="button" class="pw-toggle" onclick="togglePassword()" aria-label="Toggle password">👁</button>
          </div>
        </div>

        <div id="error-msg" role="alert">
          <span>⚠</span>
          <span id="error-text"></span>
        </div>

        <button class="btn-submit" id="submit-btn" onclick="handleLogin()">
          Authenticate
        </button>

      </div>

      <div class="card-footer">
        <span class="footer-tag">v1.0 · admin only</span>
        <a href="/login.html" class="footer-link">← user login</a>
      </div>

    </div>

  </div>

  <script>
    // Admin is the only valid role here
    const ADMIN_REDIRECT = '/admin/dashboard.html';

    // Guard: if already logged in as admin, skip
    (function guard() {
      try {
        const session = JSON.parse(sessionStorage.getItem('session') || 'null');
        if (session?.role === 'admin') {
          window.location.replace(ADMIN_REDIRECT);
        }
      } catch { sessionStorage.removeItem('session'); }
    })();

    async function handleLogin() {
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        return showError('Both fields are required.');
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method:      'POST',
          headers:     { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body:        JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          return showError(data.error || 'Authentication failed.');
        }

        // Only admin role is accepted here
        if (data.user.role !== 'admin') {
          return showError('Access denied. This console is restricted to administrators.');
        }

        // Store only non-sensitive UI data — JWT lives in HttpOnly cookie
        sessionStorage.setItem('session', JSON.stringify({
          name:          data.user.name,
          role:          data.user.role,
          restaurant_id: data.user.restaurant_id
        }));

        window.location.replace(ADMIN_REDIRECT);

      } catch {
        showError('Network error. Check your connection and try again.');
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      btn.disabled    = on;
      btn.textContent = on ? 'Authenticating…' : 'Authenticate';
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Clear error on input
    ['email', 'password'].forEach(id =>
      document.getElementById(id).addEventListener('input', hideError)
    );

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
